<div class="text-black dark:text-white mx-6">
  <h1 class="text-2xl mt-8 mb-16 text-center">Log in with your account</h1>

  <form
    [formGroup]="form"
    (ngSubmit)="onSubmit()"
    class="flex flex-col items-center justify-between gap-8"
  >
    <input
      type="text"
      placeholder="Email"
      formControlName="email"
      class="p-2 w-full dark:bg-gray-800"
    />
    <input
      type="password"
      placeholder="Password"
      formControlName="password"
      class="p-2 w-full dark:bg-gray-800"
    />
    <button
      class="bg-primary-600 text-white dark:bg-primary-500 px-4 py-2 w-full"
      type="submit"
    >
      Log in
    </button>
  </form>

  @if (formErrors()) {
  <small class="error">
    {{ formErrors() }}
  </small>
  }
</div>

<div class="flex flex-col items-center">
  @if (isLogingIn()) {
  <app-loading />
  }
</div>
