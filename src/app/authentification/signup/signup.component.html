<h1 class="text-3xl mb-8 dark:text-white">Sign up for free</h1>

<form
  [formGroup]="form"
  (ngSubmit)="onSubmit()"
  class="flex flex-col items-center justify-between gap-8"
>
  <input
    type="text"
    placeholder="Family Name"
    formControlName="familyName"
    class="p-2 w-full dark:bg-gray-800"
  />
  <input
    type="text"
    placeholder="Email"
    formControlName="email"
    class="p-2 w-full dark:bg-gray-800"
  />
  <input
    type="password"
    placeholder="Password"
    formControlName="password"
    class="p-2 w-full dark:bg-gray-800"
  />
  <button
    class="bg-primary-600 text-white dark:bg-primary-500 px-4 py-2 w-full"
    type="submit"
  >
    Sign up
  </button>
</form>

@if (formErrors()) {
<small class="error">
  {{ formErrors() }}
</small>
}

<div class="flex flex-col items-center">
  @if (isSigningUp()) {
  <app-loading />
  }
</div>
