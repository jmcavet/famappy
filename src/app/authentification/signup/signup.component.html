<h1 class="text-3xl mb-8 dark:text-white">Sign up for free</h1>

<form [formGroup]="form" (ngSubmit)="onSubmit()">
  <div>
    <input
      type="text"
      placeholder="Username"
      formControlName="username"
      class="p-2 my-2"
    />
  </div>
  <div>
    <input
      type="text"
      placeholder="Email"
      formControlName="email"
      class="p-2 my-2"
    />
  </div>
  <div>
    <input
      type="password"
      placeholder="Password"
      formControlName="password"
      class="p-2 my-2"
    />
  </div>
  <div>
    <button
      class="bg-blue-700 text-white dark:bg-blue-400 dark:text-black px-4 py-2 w-full"
      type="submit"
    >
      Sign up
    </button>
  </div>
</form>
