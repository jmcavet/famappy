<div class="flex-start flex-wrap gap-2 my-2">
  @for (ingredientCategory of ingredientCategories(); track $index) {
    <app-chip
      [selected]="
        ingredientCategorySelected()?.name === ingredientCategory.name
      "
      (toggle)="
        selectIngredientType(
          ingredientCategory,
          ingredientCategorySelected()?.name === ingredientCategory.name
        )
      "
      >{{ ingredientCategory.name }}</app-chip
    >
  }

  <app-button
    variant="ghost"
    color="secondary"
    routerLink="/manage-ingredient-categories"
    ><i class="fa-solid fa-plus mr-2 text-xl"></i>{{ linkText() }}</app-button
  >
</div>
