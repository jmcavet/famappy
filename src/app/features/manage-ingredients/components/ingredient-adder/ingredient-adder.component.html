<form [formGroup]="form">
  <div class="flex gap-2">
    <input
      type="text"
      id="name"
      name="name"
      formControlName="name"
      autocomplete="off"
      placeholder="Add a new ingredient"
      class="flex-grow"
      (keydown)="onIngredientEnterPress($event)"
    />

    <app-button (click)="addIngredient()" [disabled]="buttonIsDisabled()"
      ><i class="fa fa-plus"></i
    ></app-button>
  </div>

  @if (form.get("name")?.invalid && form.get("name")?.errors?.["maxlength"]) {
    <div class="validator mx-2">
      <small>Ingredient must be no greater than 40 characters long.</small>
    </div>
  }
  @if (nameAlreadyExists()) {
    <small>This ingredient already exists in the database.</small>
  }
</form>

<div class="flex flex-col items-center">
  @if (pageIsLoading()) {
    <app-loading />
  }
</div>
