<div class="items-container">
  <ul>
    @for (recipeCategory of dbRecipeCategories(); track $index) {
      <li>
        <span>{{ recipeCategory.name | capitalize }}</span>
        <div class="buttons-container">
          <button type="button">
            <button
              type="button"
              (click)="
                openUpdateRecipeCategoryInputModal($event, recipeCategory)
              "
            >
              <i
                class="fa-regular fa-pen-to-square text-primary-600 dark:text-primary-500 text-xl"
              ></i>
            </button>
          </button>
          <button
            type="button"
            (click)="openDeleteModal($event, recipeCategory.id)"
          >
            <i
              class="fa-regular fa-trash-can text-danger-600 dark:text-danger-500 text-xl"
            ></i>
          </button>
        </div>
      </li>
    }
  </ul>
</div>

<div class="fixed bottom-20 left-1/2 -translate-x-1/2 z-50">
  <button
    class="bg-secondary-600 rounded-full p-2 w-12 h-12 text-white shadow-lg"
    (click)="openAddRecipeCategoryInputModal($event)"
  >
    <i class="fa-solid fa-plus fa-xl"></i>
  </button>
</div>

<div class="flex flex-col items-center">
  @if (canShowPage()) {
    <app-loading />
  }
</div>
