<div class="tabs-header page-full-width surface-1">
  <p class="text-center text-2xl mb-4">Enter new recipe</p>
  <app-segmented-control
    [fullWidth]="true"
    size="lg"
    [options]="tabsTitles()"
    [selectedInput]="selectedTabTitle()"
    (selectionChange)="toggleTab($event)"
  >
  </app-segmented-control>
</div>

<div class="tabs-content section-scroll">
  <ng-content></ng-content>
</div>
