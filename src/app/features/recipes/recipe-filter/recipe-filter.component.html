<div class="sm:px-6 md:px-8 lg:px-0 lg:flex lg:justify-center">
  <div class="relative h-screen flex flex-col w-full max-w-3xl text-left">
    <!-- Scrollable main content -->
    <div class="flex-1 overflow-x-hidden overflow-y-auto p-4">
      <div class="filter-container">
        <app-filter-section
          [sectionTitle]="'Meal categories'"
          [icon]="'fa-solid fa-cake-candles'"
          [tags]="mealCategoryTags"
          [selectedIds]="mealCategoriesSelected"
        />

        <app-filter-section
          [sectionTitle]="'Cuisines'"
          [icon]="'fa-solid fa-flag'"
          [tags]="cuisineTags"
          [selectedIds]="cuisinesSelected"
        />

        <app-filter-section
          [sectionTitle]="'Recipe categories'"
          [icon]="'fa-solid fa-tag'"
          [tags]="recipeCategoryTags"
          [selectedIds]="recipeCategoriesSelected"
        />

        <app-filter-group-default
          [sectionTitle]="'Difficulty'"
          [icon]="'fa-solid fa-person-hiking'"
          [tags]="difficultyOptionTags"
        />

        <app-filter-group-default
          [sectionTitle]="'Price'"
          [icon]="'fa-solid fa-barcode'"
          [tags]="priceOptionTags"
        />

        <app-filter-group-default
          [sectionTitle]="'Frequency'"
          [icon]="'fa-solid fa-calendar-days'"
          [tags]="frequencyOptionTags"
        />

        <app-filter-group-default
          [sectionTitle]="'Season'"
          [icon]="'fa-solid fa-snowflake'"
          [tags]="seasonOptionTags"
        />

        <app-filter-section
          [sectionTitle]="'Ingredient categories'"
          [icon]="'fa-solid fa-tag'"
          [tags]="ingredientCategoryTags"
          [selectedIds]="ingredientCategoriesSelected"
        />

        <div>
          <div class="flex items-center justify-between dark:text-white">
            <div class="flex items-center justify-between gap-6">
              <p>Ingredients</p>
              <button (click)="navigateToFilterIngredients()">
                <i class="fa-solid fa-plus"></i>
              </button>
            </div>

            <button (click)="resetFilterIngredientIds()">
              <i class="fa-solid fa-power-off"></i>
            </button>
          </div>

          <div class="flex items-center flex-wrap justify-start gap-2 mt-2">
            @for(ingredientFiltered of ingredientsFiltered(); track $index) {
            <div
              class="bg-primary-600 dark:bg-primary-500 text-white border border-gray-300 dark:border-gray-600 px-4 py-2 rounded"
            >
              {{ ingredientFiltered.name }}
            </div>
            }
          </div>
        </div>
      </div>
    </div>

    <!-- Fixed button at bottom -->
    <div
      class="sticky bottom-0 left-0 w-full flex items-center justify-between gap-4 p-4 bg-white dark:bg-gray-900 border-t z-50"
    >
      <button class="clear">
        <i class="fa-solid fa-power-off"></i>
        <p (click)="onClearFilter()">Clear</p>
      </button>

      <button
        class="btn-apply"
        [class.disabled]="nbRecipesFiltered() === 0"
        [disabled]="nbRecipesFiltered() === 0"
        (click)="validateFilters()"
      >
        Filter {{ nbRecipesFiltered() }} recipes
      </button>
    </div>
  </div>
</div>
