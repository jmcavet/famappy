<div class="page-container">
  <!-- <div class="flex-1 overflow-x-hidden overflow-y-auto p-4"> -->
  <div class="section-scroll space-y-6 p-4">
    <h1 class="text-2xl text-center font-bold">Filter recipes</h1>
    <div class="filter-container">
      <section>
        <app-filter-section
          [sectionTitle]="'Meal categories'"
          [icon]="'fa-solid fa-cake-candles'"
          [tags]="mealCategoryTags"
          [selectedIds]="mealCategoriesSelected"
        />
      </section>

      <section>
        <app-filter-section
          [sectionTitle]="'Cuisines'"
          [icon]="'fa-solid fa-flag'"
          [tags]="cuisineTags"
          [selectedIds]="cuisinesSelected"
        />
      </section>

      <section>
        <app-filter-section
          [sectionTitle]="'Recipe categories'"
          [icon]="'fa-solid fa-tag'"
          [tags]="recipeCategoryTags"
          [selectedIds]="recipeCategoriesSelected"
        />
      </section>

      <section>
        <app-filter-group-default
          [sectionTitle]="'Difficulty'"
          [icon]="'fa-solid fa-person-hiking'"
          [tags]="difficultyOptionTags"
        />
      </section>

      <section>
        <app-filter-group-default
          [sectionTitle]="'Price'"
          [icon]="'fa-solid fa-barcode'"
          [tags]="priceOptionTags"
        />
      </section>

      <section>
        <app-filter-group-default
          [sectionTitle]="'Frequency'"
          [icon]="'fa-solid fa-calendar-days'"
          [tags]="frequencyOptionTags"
        />
      </section>

      <section>
        <app-filter-group-default
          [sectionTitle]="'Season'"
          [icon]="'fa-solid fa-snowflake'"
          [tags]="seasonOptionTags"
        />
      </section>

      <section>
        <app-filter-section
          [sectionTitle]="'Ingredient categories'"
          [icon]="'fa-solid fa-tag'"
          [tags]="ingredientCategoryTags"
          [selectedIds]="ingredientCategoriesSelected"
        />
      </section>

      <section>
        <div class="flex-between gap-4">
          <div class="flex-between gap-2">
            <i class="fa-solid fa-carrot"></i>
            <p class="font-semibold">Ingredients</p>
            <button (click)="navigateToFilterIngredients()">
              <i class="fa-solid fa-plus fa-xl"></i>
            </button>
          </div>

          <app-toggle-btn-with-icon
            size="sm"
            [options]="['fa-solid fa-link-slash', 'fa-solid fa-link']"
            color="secondary"
            [selectedInput]="ingredientFilterMode()"
            (selectionChange)="toggleIngredientFilterMode($event)"
          ></app-toggle-btn-with-icon>

          <button (click)="resetFilterIngredientIds()">
            <i class="fa-solid fa-eraser fa-xl"></i>
          </button>
        </div>

        <div class="flex-start flex-wrap gap-x-2 gap-y-4">
          @for (tag of ingredientsFiltered(); track tag.id) {
            <app-chip
              [selected]="ingredientsSelected().includes(tag.id)"
              (click)="toggleTag(tag.id)"
              >{{ tag.name }}</app-chip
            >
          }
        </div>
      </section>
    </div>
  </div>

  <section class="flex-between gap-4">
    <app-button
      variant="outline"
      [fullWidth]="true"
      [disabled]="nbRecipesFiltered() === 0"
      (click)="cancel()"
    >
      Cancel</app-button
    >

    <app-button
      [fullWidth]="true"
      [disabled]="nbRecipesFiltered() === 0"
      (click)="validateFilters()"
      >Filter
      <span class="font-bold text-white mx-2">{{
        nbRecipesFiltered()
      }}</span>
      recipes</app-button
    >
  </section>
</div>
