<div class="flex-start gap-6 mb-2">
  <div class="header">
    <i class="{{ icon }}"></i>
    <p class="font-semibold">{{ sectionTitle }}</p>
  </div>
  <app-button variant="ghost" (click)="selectDeselectAll()">{{
    labelToggleSelectAll()
  }}</app-button>
</div>

<div class="flex-start flex-wrap gap-2">
  @for (tag of tags(); track $index) {
    <app-chip
      [selected]="tag.selected === true"
      (click)="toggleTag(tag.name)"
      >{{ tag.name }}</app-chip
    >
  }
</div>
