<div class="text-black dark:text-white flex flex-col items-center mt-8">
  <h1 class="text-2xl">Welcome to Fam'appy v0.1.0</h1>

  @if (!user()) {
    <div class="flex-between mt-16 gap-4">
      <app-button
        [fullWidth]="true"
        variant="outline"
        size="lg"
        routerLink="/login"
        >Log in</app-button
      >
      <app-button [fullWidth]="true" size="lg" routerLink="/signup"
        >sign up</app-button
      >
    </div>
  } @else {
    <p
      class="mt-6 bg-primary-100 text-primary-800 text-xl text-center px-4 py-2 rounded"
    >
      {{ userName() }}
    </p>

    <p class="my-6">Plan your daily family life...</p>

    <section class="surface-1 flex-center">
      <button routerLink="/recipes">
        <span class="mr-4 py-4"
          ><i class="fa-solid fa-utensils fa-2xl"></i></span
        >Recipes
      </button>

      <button routerLink="/new-recipe">
        <span class="mr-4 py-4"><i class="fa-solid fa-plus fa-2xl"></i></span
        >New Recipe
      </button>
      <button routerLink="/ingredients">
        <span class="mr-4 py-4"
          ><i class="fa-solid fa-list-check fa-2xl"></i
        ></span>
        Ingredients
      </button>
      <button routerLink="/meals">
        <span class="mr-4 py-4"
          ><i class="fa-solid fa-list-check fa-2xl"></i
        ></span>
        Meals
      </button>
    </section>
  }
</div>
