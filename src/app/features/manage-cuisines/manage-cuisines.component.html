<div class="items-container">
  <ul>
    @for (cuisine of dbCuisines(); track $index) {
    <li>
      <span>{{ cuisine.name | capitalize }}</span>
      <div class="buttons-container">
        <button type="button">
          <button type="button" (click)="openModalUpdateCuisine(cuisine)">
            <i
              class="fa-regular fa-pen-to-square text-primary-600 dark:text-primary-500 text-xl"
            ></i>
          </button>
        </button>
        <button type="button" (click)="openModalDeleteCuisine(cuisine)">
          <i
            class="fa-regular fa-trash-can text-danger-600 dark:text-danger-500 text-xl"
          ></i>
        </button>
      </div>
    </li>
    }
  </ul>
</div>

<button
  class="bg-secondary-600 rounded-full p-2 w-12 h-12 text-white fixed bottom-24 right-6 shadow-lg"
>
  <i class="fa-solid fa-plus fa-xl"></i>
</button>

<button
  class="bg-secondary-600 rounded-full p-2 w-12 h-12 text-white fixed bottom-24 right-6 shadow-lg"
  (click)="openModalAddCuisine()"
>
  <i class="fa-solid fa-plus fa-xl"></i>
</button>

<app-modal-input
  title="Enter new cuisine"
  [inputValue]="cuisineName()"
  [existingItems]="dbCuisines()"
  btnConfirmText="Apply"
  btnConfirmColor="primary"
  [isModalOpen]="showModalAddCuisine()"
  (confirmEventTest)="onConfirmModalAddCuisine($event)"
/>

<app-modal-input
  title="Update cuisine"
  [inputValue]="cuisineNameToUpdate()"
  [existingItems]="dbCuisines()"
  btnConfirmText="Update"
  btnConfirmColor="primary"
  [isModalOpen]="showModalUpdateCuisine()"
  (confirmEventTest)="onConfirmModalUpdateCuisine($event)"
/>

<app-modal-confirm
  title="Delete confirmation"
  [message]="deleteMessage()"
  btnConfirmText="Delete"
  btnConfirmColor="danger"
  [isModalOpen]="showModalDeleteCuisine()"
  (confirmEvent)="onConfirmModalDeleteCuisine($event)"
/>

<div class="flex flex-col items-center">
  @if (canShowPage()) {
  <app-loading />
  }
</div>
