<ul>
  @for (mealCategory of dbMealCategories(); track $index) {
    <li (click)="selectMealCategory(mealCategory.id)">
      {{ mealCategory.name | capitalize }}
      @if (mealCategoryId() === mealCategory.id) {
        <i
          class="fa-solid fa-check fa-xl text-primary-600 dark:text-primary-500"
        ></i>
      }
    </li>
  }
</ul>

<div class="fixed bottom-20 left-1/2 -translate-x-1/2 z-50">
  <button
    class="bg-secondary-600 rounded-full p-2 w-12 h-12 text-white shadow-lg"
    (click)="openInputModal($event)"
  >
    <i class="fa-solid fa-plus fa-xl"></i>
  </button>
</div>
