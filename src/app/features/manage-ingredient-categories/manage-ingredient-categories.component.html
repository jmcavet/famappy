<ul>
  @for (ingredientCategory of dbIngredientCategories(); track $index) {
    <li>
      <div>{{ ingredientCategory.name }}</div>

      <div class="btns-container">
        <button
          type="button"
          (click)="openModalUpdateIngredientCategory(ingredientCategory)"
        >
          <i
            class="fa-regular fa-pen-to-square text-primary-600 dark:text-primary-500 text-xl"
          ></i>
        </button>

        <button
          type="button"
          (click)="openDeleteModal($event, ingredientCategory.id)"
        >
          <i
            class="fa-regular fa-trash-can text-danger-600 dark:text-danger-500 text-xl"
          ></i>
        </button>
      </div>
    </li>
  }
</ul>

<button
  class="bg-secondary-600 rounded-full p-2 w-12 h-12 text-white fixed bottom-24 right-6 shadow-lg"
  (click)="openModalAddIngredientCategory()"
>
  <i class="fa-solid fa-plus fa-xl"></i>
</button>
