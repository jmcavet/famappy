<div class="flex flex-wrap items-center justify-start gap-2 mt-6">
  @for (ingredientCategory of ingredientCategories(); track $index) {
  <button
    class="ingredient-type"
    [class.active]="
      ingredientCategorySelected()?.name === ingredientCategory.name
    "
    (click)="
      selectIngredientType(
        ingredientCategory,
        ingredientCategorySelected()?.name === ingredientCategory.name
      )
    "
  >
    {{ ingredientCategory.name }}
  </button>
  }
</div>
