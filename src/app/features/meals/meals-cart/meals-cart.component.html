<div class="flex justify-center px-4 py-6">
  <main class="w-full max-w-2xl bg-white">
    @for (mealCategory of mealCategoriesSelected; track $index) {
    <h2 class="text-2xl">{{ mealCategory.name }}</h2>
    <p class="mt-2 mb-6 w-full h-0.5 bg-gray-200"></p>
    <div class="cards-container">
      @for (recipe of cart(); track $index) { @if (recipe.mealCategoryId ===
      mealCategory.id) {
      <div
        class="card"
        [class.active]="selectedRecipes().includes(recipe)"
        (click)="toggleRecipe(recipe)"
      >
        <app-recipe-card [recipeState]="recipe"></app-recipe-card>
      </div>
      } }
    </div>
    }

    <div class="flex items-center justify-between gap-4">
      <button
        class="text-white px-4 py-2 w-full rounded-lg border mt-8"
        [ngClass]="
          selectedRecipes().length === 0
            ? 'bg-gray-200 cursor-not-allowed border-gray-200'
            : 'bg-red-600 cursor-pointer border-red-600'
        "
        [disabled]="selectedRecipes().length === 0"
        (click)="removeRecipes()"
      >
        Unselect recipes
      </button>

      <button
        class="bg-primary-600 text-white px-4 py-2 w-full rounded-lg border mt-8 cursor-pointer"
      >
        Checkout Cart
      </button>
    </div>
  </main>
</div>
