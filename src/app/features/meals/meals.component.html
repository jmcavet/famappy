@if (dataIsLoading()) {
  <app-loading />
} @else {
  <div class="space-y-4 lg:max-w-[1000px] mx-auto">
    <header class="sticky-top page-full-width">
      <app-calendar />
    </header>

    <div class="flex items-center justify-end">
      <app-button routerLink="/meals/definition"
        ><i class="fa-solid fa-add"></i>
        <i class="fa-solid fa-shopping-cart fa-xl"></i
      ></app-button>
    </div>
    <section class="flex flex-col gap-20 sm:gap-24">
      @for (
        dailyMealPlan of dailyMealPlans();
        track dailyMealPlan.weekDay.dayName;
        let i = $index
      ) {
        <app-meal-day-card
          [dailyMealPlan]="dailyMealPlan"
          id="day-{{ i }}"
          class="scroll-mt-20"
        />
      }
    </section>
  </div>
}
