<div class="text-black dark:text-white">
  <h1 class="tet-2xl mb-16">Log in with your account</h1>

  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div>
      <input
        type="text"
        placeholder="Email"
        formControlName="email"
        class="p-2 my-2"
      />
    </div>
    <div>
      <input
        type="password"
        placeholder="Password"
        formControlName="password"
        class="p-2 my-2"
      />
    </div>
    <div>
      <button
        class="bg-blue-700 text-white dark:bg-blue-400 dark:text-black px-4 py-2 w-full"
        type="submit"
      >
        Log in
      </button>
    </div>
    @if (errorSignal() !== "") {
    <p
      class="bg-red-200 text-red-800 p-2 mt-6 dark:bg-red-800 dark:text-red-200"
    >
      {{ errorSignal() }}
    </p>
    }
  </form>
</div>
