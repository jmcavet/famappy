<div class="container-grid">
  @if (isLoadingIngredientTypes) {} @else { @if ( ingredientTypes.length === 0)
  {
  <div class="message-no-type">
    <p class="dark:text-white">
      You have not specified any ingredient type yet!
    </p>
    <app-ingredient-categories-selection-page />
  </div>
  } @else {
  <app-ingredient-categories-selection-page />

  <app-ingredient-adder
    [ingredientType]="ingredientType"
    [existingIngredientNames]="existingIngredientNames"
  />

  <app-ingredient-filter
    [ingredientType]="ingredientType"
    [ingredientsFiltered]="ingredientsFiltered"
  />
  } }

  <ul>
    <li
      *ngFor="let ingredient of ingredientsFiltered; let i = index"
      class="flex items-center justify-between bg-white dark:bg-gray-800 mb-2 px-2"
    >
      <ng-container *ngIf="editIngredientIndex !== i; else editMode">
        <div
          class="dark:text-gray-50 my-2 flex items-center justify-start gap-1 w-full"
        >
          <div
            class="italic w-1/3 sm:w-1/4 lg:w-1/6 text-gray-400 dark:text-gray-500"
          >
            {{ ingredient.typeName }}
          </div>
          <div class="flex-grow">{{ ingredient.name }}</div>
        </div>
      </ng-container>

      <ng-template #editMode>
        <div class="flex items-center justify-start gap-1 w-full">
          <select
            class="w-1/3 sm:w-1/4 lg:w-1/6 py-2"
            [(ngModel)]="ingredient.typeName"
            [ngModelOptions]="{ standalone: true }"
            (change)="onTypeChange($event)"
          >
            @for (ingredientType of ingredientTypes; track $index) {
            <option [value]="ingredientType.name">
              {{ ingredientType.name }}
            </option>
            }
          </select>

          <input
            type="text"
            [(ngModel)]="ingredient.name"
            [ngModelOptions]="{ standalone: true }"
            (keydown)="onEditPressEnterIngredient($event, ingredient)"
          />
        </div>
      </ng-template>

      <div class="flex items-center justify-between gap-2">
        <ng-container *ngIf="editIngredientIndex !== i">
          <button type="button" (click)="editIngredient(i, ingredient)">
            <i
              class="fa-regular fa-pen-to-square text-primary-600 dark:text-primary-500 text-xl"
            ></i>
          </button>
        </ng-container>

        <ng-container *ngIf="editIngredientIndex === i">
          <button type="button" (click)="onValidateUpdate(ingredient)">
            <i
              class="fa-solid fa-check text-green-600 dark:text-success-500 text-xl"
            ></i>
          </button>
        </ng-container>

        <button
          type="button"
          class="bg-transparent"
          (click)="onConfirmRemoveIngredient(ingredient.id)"
        >
          <i
            class="fa-regular fa-trash-can text-danger-600 dark:text-danger-500 text-xl"
          ></i>
        </button>
        <app-modal-confirm
          title="Delete confirmation"
          [message]="getDeleteMessage()"
          btnConfirmText="Delete"
          btnConfirmColor="danger"
          [isModalOpen]="showConfirmDeleteModal"
          (confirmEvent)="onConfirmModalAction($event)"
        />
      </div>
    </li>
  </ul>

  <div class="flex flex-col items-center">
    @if (isLoadingIngredientTypes) {
    <app-loading />
    }
  </div>
</div>
