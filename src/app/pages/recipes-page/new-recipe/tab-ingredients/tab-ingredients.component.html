<form class="form-grid" [formGroup]="form">
  <div
    class="flex items-center justify-between gap-4 bg-white dark:bg-gray-800 px-2 py-2 rounded-lg cursor-pointer"
    (click)="navigateToIngredientsPage()"
  >
    <div class="flex items-center justify-start gap-2 dark:text-white">
      <i class="fa-solid fa-carrot"></i>
      <span class="text-lg">Ingredient</span>
    </div>
    <button
      type="button"
      id="btn-ingredient"
      class="btn-ingredient"
      [class.none]="ingredient === 'none'"
    >
      {{ ingredient | capitalize }}
    </button>
  </div>

  <div
    class="group-quantity"
    [ngClass]="
      ingredient === 'none' ? 'opacity-25 pointer-events-none' : 'opacity-100'
    "
  >
    <div class="flex items-center justify-start gap-2 dark:text-white">
      <i class="fa-solid fa-scale-unbalanced-flip"></i>
      <span class="text-lg">Quantity</span>
    </div>
    <div class="flex items-center justify-start gap-4">
      <input
        type="text"
        id="measure"
        name="measure"
        value="measure"
        formControlName="measure"
        class="w-[3rem]"
        autocomplete="off"
      />
      <div class="flex gap-2">
        @for (unitElement of units; track $index) {
        <button
          class="unit"
          [class.active]="unit === unitElement"
          (click)="selectUnit(unitElement, unit === unitElement)"
        >
          {{ unitElement }}
        </button>
        }
      </div>
    </div>
  </div>

  @if (form.get('measure')?.hasError('notANumber')) {
  <div class="measure-error">Value must be a number.</div>
  }

  <button
    class="btn-add"
    [disabled]="ingredient === 'none'"
    [class.disabled]="ingredient === 'none'"
    (click)="addIngredientToRecipe()"
  >
    <span class="mr-2">Add ingredient</span>
    <i class="fa fa-plus"></i>
  </button>

  <ul>
    @for (ingredient of ingredients; track $index) {
    <li class="rounded-sm mb-2">
      <div class="flex items-center justify-between">
        <div
          class="flex items-center justify-start gap-1 w-full bg-gray-200 py-2 dark:bg-gray-800 dark:text-white"
        >
          <div class="w-1/6 font-semibold ml-2">
            <span>
              {{ ingredient.measure }}
            </span>
            <span>{{ ingredient.unit }}</span>
          </div>
          <div class="w-1/6 dark:text-white">{{ ingredient.name }}</div>
        </div>

        <div class="flex items-center justify-between gap-2 ml-4">
          <button
            type="button"
            class="bg-transparent"
            (click)="onDeleteIngredient($index)"
          >
            <i
              class="fa-regular fa-trash-can text-danger-600 dark:text-danger-500 text-xl"
            ></i>
          </button>
        </div>
      </div>
    </li>
    }
  </ul>
</form>
