<ul>
  @for (cuisine of cuisines; track $index) {
  <li (click)="selectCuisine(cuisine.name)">
    {{ cuisine.name | capitalize }}
    @if (cuisinePreviouslySelected === cuisine.name) {
    <i
      class="fa-solid fa-check fa-xl text-primary-600 dark:text-primary-500"
    ></i>
    }
  </li>
  }
</ul>

<button
  class="bg-secondary-600 rounded-full p-2 w-12 h-12 text-white fixed bottom-24 right-6 shadow-lg"
  (click)="openModalInput()"
>
  <i class="fa-solid fa-plus fa-xl"></i>
</button>

<app-modal-input
  title="Enter new cuisine"
  [inputValue]="cuisineName"
  [existingItems]="cuisines"
  btnConfirmText="Apply"
  btnConfirmColor="primary"
  [isModalOpen]="showModalInput"
  (confirmEventTest)="onConfirmModalAction($event)"
/>
